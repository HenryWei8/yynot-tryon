<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype II</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #080808;
    --card-bg:     #0f0f0f;
    --card-border: #1c1c1c;
    --card-hover:  #333;
    --orange:      #8892f8;
    --orange-dim:  rgba(136,146,248,0.13);
    --pill-bg:     #141414;
    --pill-border: #252525;
    --preview-bg:  #efefef;
    --text:        #f0f0f0;
    --text-dim:    #666;
    --gap:         2px;
    --scan-color:  rgba(136,146,248,0.9);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: 1fr 340px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDE COLUMNS ── */
  .col {
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    background: var(--bg);
    padding: 6px;
  }
  .col::-webkit-scrollbar { display: none; }

  /* Grey container wrapping all cards */
  .grid-container {
    background: #161616;
    border-radius: 12px;
    padding: 5px;
    overflow: hidden;
  }

  .col-center {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-left: 1px solid #161616;
    border-right: 1px solid #161616;
  }

  .col-header {
    padding: 9px 2px 7px;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a3a3a;
    flex-shrink: 0;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

  /* ── CARDS ── */
  .card {
    aspect-ratio: 3/4;
    background: #f4f4f4;
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s, filter 0.15s;
  }
  .card:hover { filter: brightness(0.95); }
  .card.selected {
    border-color: var(--orange);
    box-shadow: 0 0 0 1px var(--orange);
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 6%;
    display: block;
  }

  /* ── PREVIEW AREA ── */
  #preview-wrap {
    flex: 1;
    background: #d8d8d8;
    position: relative;
    overflow: hidden;
    min-height: 0;
    margin: 8px 8px 0;
    border-radius: 14px;
  }

  /* Two image layers for crossfade */
  .preview-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  #layer-back  { z-index: 1; opacity: 1; }
  #layer-front { z-index: 2; opacity: 0; }

  /* ── SCAN LINE ── */
  #scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      var(--scan-color) 20%,
      #fff 50%,
      var(--scan-color) 80%,
      transparent 100%
    );
    box-shadow: 0 0 12px 3px rgba(136,146,248,0.6), 0 0 2px 1px #fff;
    top: 0;
    transform: translateY(0);
  }
  /* Scan overlay tint */
  #scan-overlay {
    position: absolute;
    inset: 0;
    z-index: 9;
    pointer-events: none;
    opacity: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── OVERLAY BADGES ── */
  .preview-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 5px;
    z-index: 20;
  }
  .preview-actions button {
    width: 30px;
    height: 30px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    backdrop-filter: blur(6px);
    transition: background 0.15s, color 0.15s;
  }
  .preview-actions button:hover {
    background: rgba(0,0,0,0.7);
    color: #fff;
  }

  #category-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.5);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 20;
  }

  #render-status {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(8,8,8,0.72);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 5px 14px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #render-status.visible { opacity: 1; }
  #render-status.pending { color: #e07c3a; border-color: rgba(224,124,58,0.25); }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .status-dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.3; transform: scale(0.6); }
  }

  /* ── CONTROLS ── */
  #controls {
    background: var(--bg);
    padding: 13px 18px 15px;
    flex-shrink: 0;
    border-top: 1px solid #161616;
  }

  #brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 13px;
  }
  #brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text);
    text-transform: uppercase;
  }
  #garment-name {
    font-size: 11px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 55%;
    text-align: right;
    transition: color 0.2s;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 7px;
  }
  .pill-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 11px;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: #888;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .pill:hover { border-color: #3a3a3a; color: #bbb; }
  .pill.active { border-color: var(--orange); color: var(--text); }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2a2a2a;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .pill.active .dot { background: var(--orange); }

  .filter-pill {
    font-size: 10px;
    padding: 3px 10px;
    background: transparent;
    border-color: #1a1a1a;
    color: #3a3a3a;
  }
  .filter-pill:hover { color: #666; border-color: #2e2e2e; }
  .filter-pill.active { border-color: var(--orange); color: var(--text-dim); }
  .filter-pill .dot { background: #1a1a1a; }
  .filter-pill.active .dot { background: var(--orange); }

  /* ── STYLE TYPE TAG ── */
  #style-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 12px;
    margin-top: -6px;
  }
  #style-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 5px;
    padding: 3px 9px;
    transition: color 0.2s, border-color 0.2s;
  }
  #fit-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #383838;
    transition: color 0.2s;
  }

  /* ── STYLE POPUP ── */
  #style-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #111;
    border: 1px solid var(--orange);
    color: var(--orange);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, box-shadow 0.15s;
  }
  #style-btn:hover { background: var(--orange-dim); box-shadow: 0 0 14px rgba(224,124,58,0.3); }
  #style-btn.active { background: var(--orange); color: #111; }

  #style-popup {
    position: fixed;
    bottom: 70px;
    right: 20px;
    z-index: 999;
    width: 272px;
    background: #0c0c0c;
    border: 1px solid #222;
    border-top: 2px solid var(--orange);
    border-radius: 12px;
    padding: 14px 15px 15px;
    transform-origin: bottom right;
    transform: scale(0.88) translateY(10px);
    opacity: 0; pointer-events: none;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s;
    box-shadow: 0 14px 44px rgba(0,0,0,0.8);
  }
  #style-popup.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

  #popup-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 9px; gap: 8px;
  }
  #popup-garment-name {
    font-size: 12px; font-weight: 600; color: #e0e0e0;
    letter-spacing: 0.02em; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  #popup-actions { display: flex; gap: 5px; flex-shrink: 0; margin-top: 1px; }
  .popup-icon-btn {
    background: none; border: none; color: #2e2e2e;
    cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
    transition: color 0.15s;
  }
  .popup-icon-btn:hover { color: #777; }

  #popup-tags { display: flex; gap: 5px; margin-bottom: 11px; flex-wrap: wrap; }
  .popup-tag {
    font-size: 9px; letter-spacing: 0.09em; text-transform: uppercase;
    border-radius: 4px; padding: 2px 7px;
  }
  .popup-tag.style-casual     { color: #555; background: #111; border: 1px solid #1e1e1e; }
  .popup-tag.style-streetwear { color: #7a83ee; background: rgba(136,146,248,0.07); border: 1px solid rgba(136,146,248,0.2); }
  .popup-tag.style-business   { color: #4a7aa8; background: rgba(74,122,168,0.07); border: 1px solid rgba(74,122,168,0.2); }
  .popup-tag.style-athletic   { color: #4a8a5a; background: rgba(74,138,90,0.07); border: 1px solid rgba(74,138,90,0.2); }
  .popup-tag.style-going-out  { color: #8a5aaa; background: rgba(138,90,170,0.07); border: 1px solid rgba(138,90,170,0.2); }
  .popup-tag.style-uniform    { color: #666; background: #0f0f0f; border: 1px solid #222; }
  .popup-tag.fit              { color: #363636; background: transparent; border: 1px solid #1a1a1a; }

  #popup-tabs {
    display: flex;
    border-bottom: 1px solid #181818;
    margin: 10px -15px 12px;
    padding: 0 15px;
    gap: 0;
  }
  .ptab {
    flex: 1; text-align: center;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 7px 4px 6px; cursor: pointer;
    color: #484848;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .ptab:hover { color: #888; }
  .ptab.active { color: var(--orange); border-bottom-color: var(--orange); }

  #popup-body {
    font-size: 12px; line-height: 1.65; color: #999;
    min-height: 52px;
  }
  #popup-body.loading { color: #252525; font-style: italic; }
  #popup-body.coming-soon { color: #252525; font-style: italic; font-size: 11px; min-height: 0; }
  @keyframes fadeInText { from { opacity:0; } to { opacity:1; } }
  #popup-body.loaded { animation: fadeInText 0.3s ease; }
</style>
</head>
<body>
<div id="app">

  <!-- LEFT -->
  <div class="col" id="col-left">
    <div class="col-header" id="header-left"></div>
    <div class="grid-container">
      <div class="grid" id="grid-left"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="col-center">
    <div id="preview-wrap">
      <img class="preview-layer" id="layer-back"  src="" alt="" />
      <img class="preview-layer" id="layer-front" src="" alt="" />
      <div id="scan-line"></div>
      <div id="scan-overlay"></div>
      <div id="category-badge"></div>
      <div id="render-status">
        <span class="status-dot"></span>
        <span id="status-text"></span>
      </div>
      <div class="preview-actions">
        <button id="btn-expand" title="Open full size">&#x26F6;</button>
        <button id="btn-download" title="Download">&#x2193;</button>
      </div>
    </div>
    <div id="controls">
      <div id="brand-row">
        <span id="brand">Prototype II</span>
        <span id="garment-name"></span>
      </div>
      <div id="style-row">
        <span id="style-tag"></span>
        <span id="fit-tag"></span>
      </div>
      <div class="section-label">Model</div>
      <div class="pill-row" id="model-pills"></div>
      <div class="section-label">Category</div>
      <div class="pill-row" id="filter-pills">
        <div class="filter-pill pill active" data-cat="all"><span class="dot"></span>All</div>
        <div class="filter-pill pill" data-cat="tops"><span class="dot"></span>Tops</div>
        <div class="filter-pill pill" data-cat="bottoms"><span class="dot"></span>Bottoms</div>
        <div class="filter-pill pill" data-cat="one-pieces"><span class="dot"></span>One-pieces</div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="col" id="col-right">
    <div class="col-header" id="header-right"></div>
    <div class="grid-container">
      <div class="grid" id="grid-right"></div>
    </div>
  </div>

</div>

<!-- STYLE POPUP -->
<div id="style-popup">
  <div id="popup-header">
    <div id="popup-garment-name"></div>
    <div id="popup-actions">
      <button class="popup-icon-btn" id="popup-refresh" title="Refresh">↺</button>
      <button class="popup-icon-btn" id="popup-close" title="Close">×</button>
    </div>
  </div>
  <div id="popup-tags"></div>
  <div id="popup-tabs">
    <div class="ptab active" data-tab="color">Color</div>
    <div class="ptab" data-tab="fit">Fit</div>
    <div class="ptab" data-tab="texture">Texture</div>
  </div>
  <div id="popup-body"></div>
</div>
<button id="style-btn" title="Style analysis  [S]">✦</button>

<script src="config.js"></script>
<script>
'use strict';

// ── State ──
let catalog        = null;
let selectedId     = null;
let selectedModel  = null;
let activeCategory = 'all';
const preloaded    = new Set();
let scanAnim       = null;  // running animation handle

// ── Boot ──
async function init() {
  try {
    const res = await fetch('catalog.json');
    if (!res.ok) throw new Error('catalog.json not found');
    catalog = await res.json();
  } catch (e) {
    document.body.innerHTML = `
      <div style="color:#e07c3a;padding:48px;font-family:monospace;line-height:1.8">
        <div style="font-size:16px;margin-bottom:10px">⚠ ${e.message}</div>
        <div style="color:#555">python3 -m http.server 8080</div>
      </div>`;
    return;
  }

  buildModelPills();
  selectedModel = catalog.models[0];
  activatePill(selectedModel);
  buildCategoryFilters();
  renderGrids();

  if (catalog.garments.length > 0) selectGarment(catalog.garments[0].id);
}

// ── Filtered ──
function filteredGarments() {
  if (activeCategory === 'all') return catalog.garments;
  return catalog.garments.filter(g => g.category === activeCategory);
}

// ── Grids ──
function renderGrids() {
  const gs   = filteredGarments();
  const half = Math.ceil(gs.length / 2);
  buildGrid('grid-left',  gs.slice(0, half));
  buildGrid('grid-right', gs.slice(half));
  document.getElementById('header-left').textContent  = `Garments · ${gs.length}`;
  document.getElementById('header-right').textContent = '';
}

function buildGrid(id, garments) {
  const grid = document.getElementById(id);
  grid.innerHTML = '';
  garments.forEach(g => {
    const card = document.createElement('div');
    card.className = 'card' + (g.id === selectedId ? ' selected' : '');
    card.dataset.id = g.id;
    const img = document.createElement('img');
    img.src = g.thumbnail;
    img.alt = g.name;
    img.loading = 'lazy';
    img.onerror = () => { img.style.opacity = '0.2'; };
    card.appendChild(img);
    card.addEventListener('click', () => selectGarment(g.id));
    grid.appendChild(card);
  });
}

// ── Model pills ──
function buildModelPills() {
  const row = document.getElementById('model-pills');
  const meta = catalog.models_meta || {};
  row.innerHTML = '';
  catalog.models.forEach(m => {
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.dataset.model = m;
    pill.innerHTML = `<span class="dot"></span>${meta[m] || m}`;
    pill.addEventListener('click', () => {
      selectedModel = m;
      activatePill(m);
      updatePreview();
    });
    row.appendChild(pill);
  });
}
function activatePill(name) {
  document.querySelectorAll('#model-pills .pill').forEach(p =>
    p.classList.toggle('active', p.dataset.model === name)
  );
}

// ── Category filters ──
function buildCategoryFilters() {
  document.querySelectorAll('#filter-pills .filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      activeCategory = pill.dataset.cat;
      document.querySelectorAll('#filter-pills .filter-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.cat === activeCategory)
      );
      renderGrids();
    });
  });
}

// ── Selection ──
function selectGarment(id) {
  selectedId = id;
  document.querySelectorAll('.card').forEach(c =>
    c.classList.toggle('selected', c.dataset.id === id)
  );
  const sel = document.querySelector(`.card[data-id="${id}"]`);
  if (sel) sel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  updatePreview();
  preloadNeighbors(id);
  const g = catalog?.garments.find(g => g.id === id);
  if (g && typeof updateStyleTag !== 'undefined') updateStyleTag(g);
}

// ── Scan-line transition ──
function playScan(onMidpoint) {
  if (scanAnim) { cancelAnimationFrame(scanAnim); scanAnim = null; }

  const wrap    = document.getElementById('preview-wrap');
  const line    = document.getElementById('scan-line');
  const overlay = document.getElementById('scan-overlay');
  const front   = document.getElementById('layer-front');
  const back    = document.getElementById('layer-back');
  const h       = wrap.offsetHeight;
  const DURATION = 420; // ms

  overlay.style.opacity = '0.35';
  line.style.opacity    = '1';

  let start = null;
  let swapped = false;

  function step(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / DURATION, 1);
    const y = p * h;

    line.style.top       = y + 'px';
    line.style.transform = 'translateY(0)';

    // At 50%: swap the images underneath the scan line
    if (!swapped && p >= 0.5) {
      swapped = true;
      onMidpoint();
    }

    if (p < 1) {
      scanAnim = requestAnimationFrame(step);
    } else {
      // Settle: fade front over back, hide scan fx
      front.style.transition = 'opacity 0.18s ease';
      front.style.opacity    = '1';
      back.style.opacity     = '0';

      line.style.opacity    = '0';
      overlay.style.opacity = '0';

      // Clean up: promote front → back for next transition
      setTimeout(() => {
        back.src             = front.src;
        back.style.opacity   = '1';
        front.style.opacity  = '0';
        front.style.transition = '';
        scanAnim = null;
      }, 200);
    }
  }
  scanAnim = requestAnimationFrame(step);
}

// ── Preview update ──
function updatePreview() {
  if (!selectedId || !selectedModel) return;
  const garment = catalog.garments.find(g => g.id === selectedId);
  if (!garment) return;

  const statusEl  = document.getElementById('render-status');
  const statusTxt = document.getElementById('status-text');
  const statusDot = statusEl.querySelector('.status-dot');
  const catBadge  = document.getElementById('category-badge');
  const nameEl    = document.getElementById('garment-name');
  const dlBtn     = document.getElementById('btn-download');

  nameEl.textContent    = garment.name;
  catBadge.textContent  = garment.category;

  const renderPath = garment.renders?.[selectedModel];

  if (!renderPath) {
    playScan(() => {
      document.getElementById('layer-front').src = garment.thumbnail;
    });
    statusEl.className  = 'visible pending';
    statusTxt.textContent = 'render pending';
    statusDot.className = 'status-dot pulse';
    dlBtn.onclick = null;
    return;
  }

  // Preload then animate
  const probe = new Image();
  probe.onload = () => {
    playScan(() => {
      document.getElementById('layer-front').src = renderPath;
    });
    statusEl.className  = 'visible';
    statusTxt.textContent = selectedModel;
    statusDot.className = 'status-dot';

    // Hide status after 1.5s
    setTimeout(() => { statusEl.className = ''; }, 1500);

    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = renderPath;
      a.download = `${selectedModel}__${selectedId}.jpg`;
      a.click();
    };
  };
  probe.onerror = () => {
    playScan(() => {
      document.getElementById('layer-front').src = garment.thumbnail;
    });
    statusEl.className  = 'visible pending';
    statusTxt.textContent = 'render pending';
    statusDot.className = 'status-dot pulse';
    dlBtn.onclick = null;
  };
  probe.src = renderPath;

  if (typeof onSelectionChange !== 'undefined') setTimeout(onSelectionChange, 80);
}

// ── Preload neighbors ──
function preloadNeighbors(currentId) {
  const all = filteredGarments();
  const idx = all.findIndex(g => g.id === currentId);
  [-1, 1, 2].forEach(d => {
    const n = all[idx + d];
    if (!n) return;
    catalog.models.forEach(m => {
      const p = n.renders?.[m];
      if (p && !preloaded.has(p)) { new Image().src = p; preloaded.add(p); }
    });
  });
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 's' || e.key === 'S') {
    if (popupOpen) { closePopup(); } else { openPopup(); showAnalysis(); }
    return;
  }
  if (!catalog || !selectedId) return;
  const all = filteredGarments();
  const idx = all.findIndex(g => g.id === selectedId);
  const map = { ArrowRight: 1, ArrowLeft: -1, ArrowDown: 3, ArrowUp: -3 };
  const delta = map[e.key];
  if (delta === undefined) return;
  const next = idx + delta;
  if (next >= 0 && next < all.length) selectGarment(all[next].id);
});

// ── Expand ──
document.getElementById('btn-expand').addEventListener('click', () => {
  const src = document.getElementById('layer-back').src;
  if (src && !src.endsWith('/')) window.open(src, '_blank');
});

// ─────────────────────────────────────────────
// STYLE POPUP + COLOR ANALYSIS
// ─────────────────────────────────────────────

const GROQ_API_KEY = window.GROQ_API_KEY || '';
const GROQ_MODEL   = 'llama-3.3-70b-versatile';
const PROMPTS = {
  color: `You are a personal stylist trained in color science. First person, 2 sentences max, no hedging.

Apply these rules:
UNDERTONE MATCHING — Warm undertones (golden/yellow cast): suit earth tones, camel, warm reds, oranges, olive, peach, coral. Avoid cool blues/purples/greys. Cool undertones (pink/blue cast): suit navy, lavender, emerald, jewel tones, dusty rose, burgundy. Avoid warm oranges/yellows. Olive: suits warm neutrals, khaki, gold, terracotta. Neutral: most palettes work.
SEASONAL LOGIC — Infer season from depth + undertone: fair+warm=Spring (coral, peach, warm yellow); fair+cool=Summer (lavender, powder blue, dusty rose); deep+warm=Autumn (rust, mustard, burnt orange, forest green); deep+cool=Winter (crisp white, black, royal blue, jewel tones). Medium skin is most versatile.
CONTRAST — Very light or very dark skin reads best in high-contrast combinations. Medium skin suits both high- and low-contrast.
VERDICT — State clearly whether the garment color works for this undertone/depth. If not, name a specific better color family.`,

  fit: `You are a personal stylist trained in garment construction and body perception science. First person, 2 sentences max, no hedging.

Apply these rules:
LINE DIRECTION — Vertical lines (seams, stripes, plackets) elongate the body and add height. Horizontal lines add visual width and anchor sections of the torso. Diagonal lines create movement and a dynamic, slimming effect. Curved lines read as graceful and fluid.
STRIPE SCIENCE — Narrow horizontal stripes with double-width gaps (e.g. 1cm stripe / 2cm gap) are clinically the most slimming silhouette front-on. Equidistant vertical stripes slim from the back. Slimming effect weakens as stripe spacing widens.
SILHOUETTE — Oversized cuts add volume and can overwhelm smaller or narrower frames. Cropped silhouettes shorten the torso visually. A-line and flared cuts are most universally flattering — they suggest an hourglass. Regular/relaxed fit is the neutral baseline.
VERDICT — State what the garment's cut does to this person's silhouette. If it's unflattering, say exactly why and name a better cut direction.`,
};

const analysisCache = {};  // key → { color, fit }
let activeTab   = 'color';
let popupOpen   = false;
let analyzing   = false;

// ── Style / fit classifiers ──
function classifyStyle(name, category) {
  const n = name.toLowerCase();
  if (/suit|blazer|dress.shirt|slacks|trouser/.test(n)) return 'Business';
  if (/polo|chino|khaki|cardigan|loafer|button.down/.test(n)) return 'Business Casual';
  if (/uniform|scrubs|workwear/.test(n)) return 'Uniform';
  if (/varsity|graphic|streetwear|cargo|hoodie|sweatshirt/.test(n)) return 'Streetwear';
  if (/crop|mini|bodycon|slip|cami/.test(n)) return 'Going Out';
  if (/athletic|sport|gym|track|workout|yoga|jogger/.test(n)) return 'Athletic';
  if (/denim|jean/.test(n)) return 'Casual';
  if (/oversized/.test(n)) return 'Casual / Streetwear';
  return 'Casual';
}

function classifyFit(name) {
  const n = name.toLowerCase();
  if (/oversized|baggy|relaxed/.test(n)) return 'Oversized';
  if (/crop|cropped/.test(n)) return 'Cropped';
  if (/slim|skinny|fitted|tight/.test(n)) return 'Slim fit';
  if (/straight|regular|classic/.test(n)) return 'Regular fit';
  if (/raglan/.test(n)) return 'Raglan cut';
  if (/wide|flare/.test(n)) return 'Wide leg';
  return 'Regular fit';
}

function updateStyleTag(garment) {
  if (!garment) return;
  const style = classifyStyle(garment.name, garment.category);
  const fit   = classifyFit(garment.name);
  const styleEl = document.getElementById('style-tag');
  const fitEl   = document.getElementById('fit-tag');
  if (styleEl) { styleEl.textContent = style; styleEl.style.display = ''; }
  if (fitEl)   { fitEl.textContent   = fit;   fitEl.style.display   = ''; }
}

// ── Color math ──
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g-b)/d + (g<b?6:0)) / 6; break;
      case g: h = ((b-r)/d + 2) / 6; break;
      case b: h = ((r-g)/d + 4) / 6; break;
    }
  }
  return [h*360, s*100, l*100];
}

function isSkinPixel(r, g, b) {
  const [h, s, l] = rgbToHsl(r, g, b);
  return h >= 0 && h <= 45 && s >= 8 && s <= 75 && l >= 25 && l <= 80
    && r > g && r > b; // skin: red channel dominant
}

function describeColor(r, g, b) {
  const [h, s, l] = rgbToHsl(r, g, b);
  if (s < 9) {
    if (l < 18) return 'black'; if (l < 38) return 'charcoal';
    if (l < 58) return 'gray'; if (l < 80) return 'light gray'; return 'off-white';
  }
  let hue;
  if      (h < 14 || h >= 345) hue = 'red';
  else if (h < 30)  hue = 'orange-red';
  else if (h < 48)  hue = 'orange';
  else if (h < 60)  hue = 'amber';
  else if (h < 75)  hue = 'yellow';
  else if (h < 105) hue = 'yellow-green';
  else if (h < 152) hue = 'green';
  else if (h < 178) hue = 'teal';
  else if (h < 198) hue = 'cyan';
  else if (h < 228) hue = 'sky blue';
  else if (h < 258) hue = 'blue';
  else if (h < 275) hue = 'indigo';
  else if (h < 295) hue = 'purple';
  else if (h < 320) hue = 'violet';
  else              hue = 'pink';
  let pre = '';
  if      (l < 18) pre = 'near-black ';
  else if (l < 30) pre = 'deep ';
  else if (l < 42) pre = 'dark ';
  else if (l > 80) pre = 'pale ';
  else if (l > 65) pre = 'light ';
  if (s < 22) pre = 'muted ' + pre;
  return (pre + hue).trim();
}

function describeSkinTone(r, g, b) {
  const [h, s, l] = rgbToHsl(r, g, b);
  const depth = l > 72 ? 'fair' : l > 62 ? 'light' : l > 52 ? 'medium' : l > 42 ? 'medium-deep' : l > 32 ? 'deep' : 'very deep';
  const undertone = h < 18 ? 'warm' : h < 34 ? 'warm-neutral' : h < 48 ? 'olive' : 'neutral';
  return `${depth} skin with ${undertone} undertones`;
}

// ── Image color extraction via Canvas ──
async function extractSkinTone(modelId) {
  const extensions = ['jpg', 'png', 'webp'];
  for (const ext of extensions) {
    try {
      const result = await new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => {
          const W = img.naturalWidth, H = img.naturalHeight;
          const canvas = document.createElement('canvas');
          canvas.width = W; canvas.height = H;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          // Sample face/neck region: top 5–24% height, center 25–75% width
          const x0 = Math.floor(W*0.25), x1 = Math.floor(W*0.75);
          const y0 = Math.floor(H*0.04), y1 = Math.floor(H*0.24);
          const d = ctx.getImageData(x0, y0, x1-x0, y1-y0).data;
          let rs=0, gs=0, bs=0, n=0;
          for (let i = 0; i < d.length; i += 4) {
            if (isSkinPixel(d[i], d[i+1], d[i+2])) { rs+=d[i]; gs+=d[i+1]; bs+=d[i+2]; n++; }
          }
          if (n < 20) { rej(); return; }
          res(describeSkinTone(Math.round(rs/n), Math.round(gs/n), Math.round(bs/n)));
        };
        img.onerror = rej;
        img.src = `assets/models/${modelId}.${ext}`;
      });
      return result;
    } catch { continue; }
  }
  return null;
}

async function extractGarmentColors(thumbnailSrc) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const W = img.naturalWidth, H = img.naturalHeight;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      canvas.getContext('2d').drawImage(img, 0, 0);
      const d = canvas.getContext('2d').getImageData(0, 0, W, H).data;
      const buckets = {};
      for (let i = 0; i < d.length; i += 12) {
        const r=d[i], g=d[i+1], b=d[i+2], a=d[i+3];
        if (a < 100) continue;
        if (r>228 && g>228 && b>228) continue; // skip white bg
        if (r<22  && g<22  && b<22)  continue; // skip black
        const key = `${Math.round(r/24)*24},${Math.round(g/24)*24},${Math.round(b/24)*24}`;
        buckets[key] = (buckets[key]||0) + 1;
      }
      const sorted = Object.entries(buckets).sort((a,b) => b[1]-a[1]);
      if (!sorted.length) { res('neutral'); return; }
      const names = sorted.slice(0, 3).map(([k]) => {
        const [r,g,b] = k.split(',').map(Number);
        return describeColor(r, g, b);
      });
      const unique = [...new Set(names)];
      res(unique.slice(0, 2).join(' and '));
    };
    img.onerror = () => res('neutral');
    img.src = thumbnailSrc;
  });
}

// ── Groq API ──
async function callGroq(promptKey, userContent) {
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: GROQ_MODEL,
      messages: [
        { role: 'system', content: PROMPTS[promptKey] },
        { role: 'user',   content: userContent }
      ],
      max_tokens: 130,
      temperature: 0.7
    })
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return (await r.json()).choices[0].message.content.trim();
}

// ── Style → CSS class ──
function styleClass(styleLabel) {
  const map = {
    'Casual': 'style-casual', 'Casual / Streetwear': 'style-streetwear',
    'Streetwear': 'style-streetwear', 'Business': 'style-business',
    'Business Casual': 'style-business', 'Athletic': 'style-athletic',
    'Going Out': 'style-going-out', 'Uniform': 'style-uniform',
  };
  return map[styleLabel] || 'style-casual';
}

// ── Popup helpers ──
function renderPopupMeta(garment) {
  document.getElementById('popup-garment-name').textContent = garment.name;
  const tagsEl = document.getElementById('popup-tags');
  tagsEl.innerHTML = '';
  const styleLabel = classifyStyle(garment.name, garment.category);
  const fitLabel   = classifyFit(garment.name);
  const st = document.createElement('span');
  st.className = `popup-tag ${styleClass(styleLabel)}`; st.textContent = styleLabel;
  const ft = document.createElement('span');
  ft.className = 'popup-tag fit'; ft.textContent = fitLabel;
  tagsEl.append(st, ft);
}

function renderTabContent(cache) {
  const body = document.getElementById('popup-body');
  if (activeTab === 'texture') {
    body.textContent = 'Coming soon.';
    body.className = 'coming-soon';
    return;
  }
  const text = cache?.[activeTab];
  if (!text) {
    body.textContent = 'Analyzing…';
    body.className = 'loading';
  } else {
    body.textContent = text;
    body.className = 'loaded';
  }
}

function setActiveTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.ptab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab)
  );
  const key = selectedModel && selectedId ? `${selectedModel}__${selectedId}` : null;
  renderTabContent(key ? analysisCache[key] : null);
}

function openPopup() {
  popupOpen = true;
  document.getElementById('style-popup').classList.add('open');
  document.getElementById('style-btn').classList.add('active');
}
function closePopup() {
  popupOpen = false;
  document.getElementById('style-popup').classList.remove('open');
  document.getElementById('style-btn').classList.remove('active');
}

// ── Analysis (cached per model__garment, both tabs fetched in parallel) ──
async function showAnalysis() {
  if (!catalog || !selectedId || !selectedModel) return;
  const key     = `${selectedModel}__${selectedId}`;
  const garment = catalog.garments.find(g => g.id === selectedId);
  if (!garment) return;

  renderPopupMeta(garment);

  // Serve from cache instantly if complete
  if (analysisCache[key]?.color && analysisCache[key]?.fit) {
    renderTabContent(analysisCache[key]);
    return;
  }

  if (analyzing) return;
  analyzing = true;
  analysisCache[key] = {};
  renderTabContent(analysisCache[key]);

  try {
    const [skin, garmentColor] = await Promise.all([
      extractSkinTone(selectedModel),
      extractGarmentColors(garment.thumbnail)
    ]);

    const catLabel  = garment.category === 'one-pieces' ? 'one-piece' : garment.category === 'bottoms' ? 'bottom' : 'top';
    const modelName = (catalog.models_meta || {})[selectedModel] || selectedModel;
    const styleType = classifyStyle(garment.name, garment.category);
    const fitDesc   = classifyFit(garment.name);

    const colorCtx = skin
      ? `${modelName} has ${skin}. Garment: ${garmentColor} ${catLabel} called "${garment.name}".`
      : `Garment: ${garmentColor} ${catLabel} called "${garment.name}".`;
    const fitCtx = `${modelName || 'Model'} is wearing a ${garmentColor} ${catLabel} — ${styleType} style, ${fitDesc} — called "${garment.name}".`;

    // Fetch both in parallel; update each tab as it resolves
    const colorP = callGroq('color', colorCtx).then(r => {
      analysisCache[key].color = r;
      if (activeTab === 'color') renderTabContent(analysisCache[key]);
    }).catch(() => { analysisCache[key].color = 'Could not load.'; });

    const fitP = callGroq('fit', fitCtx).then(r => {
      analysisCache[key].fit = r;
      if (activeTab === 'fit') renderTabContent(analysisCache[key]);
    }).catch(() => { analysisCache[key].fit = 'Could not load.'; });

    await Promise.all([colorP, fitP]);
  } catch {
    renderTabContent(null);
  }

  analyzing = false;
}

// ── Popup wiring ──
document.getElementById('style-btn').addEventListener('click', () => {
  if (popupOpen) { closePopup(); return; }
  openPopup();
  showAnalysis();
});
document.getElementById('popup-close').addEventListener('click', closePopup);
document.getElementById('popup-refresh').addEventListener('click', () => {
  if (!selectedId || !selectedModel) return;
  delete analysisCache[`${selectedModel}__${selectedId}`];
  showAnalysis();
});
document.querySelectorAll('.ptab').forEach(t => {
  t.addEventListener('click', () => setActiveTab(t.dataset.tab));
});

// Re-analyze when garment or model changes while popup is open
function onSelectionChange() {
  if (popupOpen) showAnalysis();
}

init();
</script>
