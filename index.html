<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YYNOT? Try-On</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0a0a0a;
    --card-bg:    #111111;
    --card-border:#1e1e1e;
    --card-hover: #3a3a3a;
    --orange:     #e07c3a;
    --pill-bg:    #1a1a1a;
    --pill-border:#2a2a2a;
    --preview-bg: #f0f0f0;
    --text:       #ffffff;
    --text-dim:   #888888;
    --gap:        3px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: 340px 1fr 340px;
    height: 100vh;
    overflow: hidden;
  }

  /* ── COLUMNS ── */
  .col {
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .col::-webkit-scrollbar { display: none; }

  .col-center {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-left: 1px solid #1a1a1a;
    border-right: 1px solid #1a1a1a;
  }

  /* ── GRIDS ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    padding: var(--gap);
  }

  /* ── CARDS ── */
  .card {
    aspect-ratio: 3/4;
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.1s;
    position: relative;
  }
  .card:hover { border-color: var(--card-hover); }
  .card.selected {
    border: 2px solid var(--orange);
    box-shadow: 0 0 0 1px var(--orange);
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 8%;
    display: block;
  }

  /* ── CENTER: PREVIEW ── */
  #preview-wrap {
    flex: 1;
    background: var(--preview-bg);
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  #preview-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity 0.12s ease;
  }
  #preview-img.loading { opacity: 0.35; }

  .preview-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
  }
  .preview-actions button {
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.5);
    border: none;
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background 0.15s;
  }
  .preview-actions button:hover { background: rgba(0,0,0,0.78); }

  /* Category badge in preview */
  #category-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.55);
    color: #bbb;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    pointer-events: none;
  }

  #pending-badge {
    display: none;
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    color: #ccc;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
  }

  /* ── CENTER: CONTROLS ── */
  #controls {
    background: var(--bg);
    padding: 14px 18px 16px;
    flex-shrink: 0;
    border-top: 1px solid #1a1a1a;
  }
  #brand-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 11px;
  }
  #brand {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text);
    text-transform: uppercase;
  }
  #garment-name {
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .pill-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.12s;
  }
  .pill:hover { border-color: #555; }
  .pill.active { border-color: var(--orange); color: #fff; }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #3a3a3a;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  .pill.active .dot { background: var(--orange); }

  /* category filter pills */
  .filter-pill {
    font-size: 11px;
    padding: 3px 10px;
    gap: 5px;
    background: transparent;
    border-color: #222;
    color: var(--text-dim);
  }
  .filter-pill.active { border-color: var(--orange); color: var(--text); }
  .filter-pill .dot { background: #222; }
  .filter-pill.active .dot { background: var(--orange); }

  /* count badges on grids */
  .col-header {
    padding: 10px 10px 4px;
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: #444;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="app">

  <!-- LEFT COLUMN: garments (first half) -->
  <div class="col" id="col-left">
    <div class="col-header" id="header-left"></div>
    <div class="grid" id="grid-left"></div>
  </div>

  <!-- CENTER -->
  <div class="col-center">
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="try-on preview" />
      <div id="category-badge"></div>
      <div id="pending-badge">render pending — run prerender.py</div>
      <div class="preview-actions">
        <button id="btn-expand" title="Open full size">&#x26F6;</button>
        <button id="btn-download" title="Download">&#x2193;</button>
      </div>
    </div>
    <div id="controls">
      <div id="brand-row">
        <span id="brand">YYNOT?</span>
        <span id="garment-name"></span>
      </div>
      <div class="section-label">Model</div>
      <div class="pill-row" id="model-pills"></div>
      <div class="section-label">Category</div>
      <div class="pill-row" id="filter-pills">
        <div class="filter-pill pill active" data-cat="all"><span class="dot"></span>All</div>
        <div class="filter-pill pill" data-cat="tops"><span class="dot"></span>Tops</div>
        <div class="filter-pill pill" data-cat="bottoms"><span class="dot"></span>Bottoms</div>
        <div class="filter-pill pill" data-cat="one-pieces"><span class="dot"></span>One-pieces</div>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN: garments (second half) -->
  <div class="col" id="col-right">
    <div class="col-header" id="header-right"></div>
    <div class="grid" id="grid-right"></div>
  </div>

</div>

<script>
'use strict';

// ── State ──
let catalog        = null;
let selectedId     = null;
let selectedModel  = null;
let activeCategory = 'all';
const preloaded    = new Set();

// ── Boot ──
async function init() {
  try {
    const res = await fetch('catalog.json');
    if (!res.ok) throw new Error('catalog.json not found — run Phase 6 script first');
    catalog = await res.json();
  } catch (e) {
    document.body.innerHTML = `
      <div style="color:#e07c3a;padding:48px;font-family:monospace;line-height:1.8">
        <div style="font-size:18px;margin-bottom:12px">⚠ ${e.message}</div>
        <div style="color:#888">Start the server from the yynot-tryon/ directory:<br>
        <code style="color:#ccc">python3 -m http.server 8080</code></div>
      </div>`;
    return;
  }

  buildModelPills();
  selectedModel = catalog.models[0];
  activatePill(selectedModel);

  buildCategoryFilters();
  renderGrids();

  if (catalog.garments.length > 0) {
    selectGarment(catalog.garments[0].id);
  }
}

// ── Filtered garments ──
function filteredGarments() {
  if (activeCategory === 'all') return catalog.garments;
  return catalog.garments.filter(g => g.category === activeCategory);
}

// ── Grids ──
function renderGrids() {
  const garments = filteredGarments();
  const half = Math.ceil(garments.length / 2);
  buildGrid('grid-left',  garments.slice(0, half));
  buildGrid('grid-right', garments.slice(half));

  const total = garments.length;
  document.getElementById('header-left').textContent  = `Garments (${total})`;
  document.getElementById('header-right').textContent = '';

  // Re-highlight if selected is still visible
  if (selectedId) {
    document.querySelectorAll('.card').forEach(c => {
      c.classList.toggle('selected', c.dataset.id === selectedId);
    });
  }
}

function buildGrid(containerId, garments) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  garments.forEach(g => {
    const card = document.createElement('div');
    card.className = 'card' + (g.id === selectedId ? ' selected' : '');
    card.dataset.id = g.id;

    const img = document.createElement('img');
    img.src = g.thumbnail;
    img.alt = g.name;
    img.loading = 'lazy';
    img.onerror = () => { img.style.opacity = '0.25'; };

    card.appendChild(img);
    card.addEventListener('click', () => selectGarment(g.id));
    grid.appendChild(card);
  });
}

// ── Model pills ──
function buildModelPills() {
  const row = document.getElementById('model-pills');
  row.innerHTML = '';
  catalog.models.forEach(m => {
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.dataset.model = m;
    pill.innerHTML = `<span class="dot"></span>${m}`;
    pill.addEventListener('click', () => {
      selectedModel = m;
      activatePill(m);
      updatePreview();
    });
    row.appendChild(pill);
  });
}

function activatePill(modelName) {
  document.querySelectorAll('#model-pills .pill').forEach(p => {
    p.classList.toggle('active', p.dataset.model === modelName);
  });
}

// ── Category filters ──
function buildCategoryFilters() {
  document.querySelectorAll('#filter-pills .filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      activeCategory = pill.dataset.cat;
      document.querySelectorAll('#filter-pills .filter-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.cat === activeCategory)
      );
      renderGrids();
    });
  });
}

// ── Selection ──
function selectGarment(id) {
  selectedId = id;
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('selected', c.dataset.id === id);
  });
  const sel = document.querySelector(`.card[data-id="${id}"]`);
  if (sel) sel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  updatePreview();
  preloadNeighbors(id);
}

// ── Preview ──
function updatePreview() {
  if (!selectedId || !selectedModel) return;
  const garment = catalog.garments.find(g => g.id === selectedId);
  if (!garment) return;

  const badge      = document.getElementById('pending-badge');
  const catBadge   = document.getElementById('category-badge');
  const img        = document.getElementById('preview-img');
  const dlBtn      = document.getElementById('btn-download');
  const nameEl     = document.getElementById('garment-name');

  nameEl.textContent = garment.name;
  catBadge.textContent = garment.category;

  const renderPath = garment.renders?.[selectedModel];

  img.classList.add('loading');
  badge.style.display = 'none';

  if (!renderPath) {
    img.src = garment.thumbnail;
    img.classList.remove('loading');
    badge.style.display = 'block';
    dlBtn.onclick = null;
    return;
  }

  const probe = new Image();
  probe.onload = () => {
    img.src = renderPath;
    img.onload = () => img.classList.remove('loading');
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = renderPath;
      a.download = `${selectedModel}__${selectedId}.jpg`;
      a.click();
    };
  };
  probe.onerror = () => {
    img.src = garment.thumbnail;
    img.classList.remove('loading');
    badge.style.display = 'block';
    dlBtn.onclick = null;
  };
  probe.src = renderPath;
}

// ── Preload neighbors ──
function preloadNeighbors(currentId) {
  const all = filteredGarments();
  const idx = all.findIndex(g => g.id === currentId);
  [-1, 1, 2].forEach(offset => {
    const neighbor = all[idx + offset];
    if (!neighbor) return;
    catalog.models.forEach(m => {
      const path = neighbor.renders?.[m];
      if (path && !preloaded.has(path)) {
        new Image().src = path;
        preloaded.add(path);
      }
    });
  });
}

// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (!catalog || !selectedId) return;
  const all = filteredGarments();
  const idx = all.findIndex(g => g.id === selectedId);
  if (e.key === 'ArrowRight' && idx < all.length - 1)
    selectGarment(all[idx + 1].id);
  if (e.key === 'ArrowLeft' && idx > 0)
    selectGarment(all[idx - 1].id);
  if (e.key === 'ArrowDown' && idx + 3 < all.length)
    selectGarment(all[idx + 3].id);
  if (e.key === 'ArrowUp' && idx - 3 >= 0)
    selectGarment(all[idx - 3].id);
});

// ── Expand ──
document.getElementById('btn-expand').addEventListener('click', () => {
  const img = document.getElementById('preview-img');
  if (img.src && img.src !== window.location.href) window.open(img.src, '_blank');
});

// ── Go ──
init();
</script>
</body>
</html>
